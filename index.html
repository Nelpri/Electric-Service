<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electric Service</title>

  <!-- CSS modular -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

  <h1>Registro de Servicios Eléctricos</h1>

  <main class="container">
    <form id="form">

      <!-- Cliente -->
      <fieldset class="form-section">
        <legend>Datos del cliente</legend>

        <div class="field">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
        </div>

        <div class="field">
          <label>Teléfono</label>
          <input type="tel" id="telefono" placeholder="Ej: 3001234567">
        </div>
      </fieldset>

      <!-- Servicio -->
      <fieldset class="form-section">
        <legend>Detalle del servicio</legend>

        <div class="field">
          <label>Tipo de trabajo</label>
          <select id="tipo">
            <option>Revisión</option>
            <option>Instalación</option>
            <option>Reparación</option>
          </select>
        </div>

        <div class="field">
          <label>Observaciones</label>
          <textarea id="descripcion" placeholder="Describe el trabajo..."></textarea>
        </div>
      </fieldset>

      <!-- Checklist -->
      <fieldset class="form-section">
        <legend>Checklist de revisión</legend>

        <div class="checklist">
          <div class="checklist-grid">

            <label><input type="checkbox" value="Breaker"> Breaker</label>
            <label><input type="checkbox" value="Cableado"> Cableado</label>
            <label><input type="checkbox" value="Tomacorrientes"> Tomas</label>
            <label><input type="checkbox" value="Iluminación"> Iluminación</label>
            <label><input type="checkbox" value="Tierra"> Tierra</label>
            <label><input type="checkbox" value="Voltaje"> Voltaje</label>

          </div>
        </div>
      </fieldset>

      <!-- Foto -->
      <fieldset class="form-section">
        <legend>Foto del trabajo</legend>

        <input type="file" id="foto" accept="image/*">

        <div class="img-preview" id="preview">
          <p class="small">Sin imagen</p>
        </div>
      </fieldset>

      <!-- Botones -->
      <div class="actions">
        <button type="submit" class="primary">Guardar</button>
        <button type="reset" class="secondary">Limpiar</button>
      </div>

    </form>
  </main>

  <!-- Lista -->
  <section class="container">
    <h2>Registros</h2>
    <ul id="lista"></ul>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/app.js"></script>

</body>
</html>
